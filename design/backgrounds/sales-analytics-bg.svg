<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <title>Sales Analytics - Report Background</title>
  <desc>Enterprise Power BI report background for the Sales Analytics model. Import into Power BI Desktop via Format pane > Page background > Browse.</desc>

  <!-- Page canvas -->
  <rect width="1280" height="720" fill="#F7F9FC"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="1280" height="72" fill="#1A2B4A"/>

  <!-- Header accent line -->
  <rect x="0" y="69" width="1280" height="3" fill="#4A90D9"/>

  <!-- Left navigation panel -->
  <rect x="0" y="72" width="220" height="648" fill="#EBF0F8"/>

  <!-- Nav panel right border -->
  <rect x="219" y="72" width="1" height="648" fill="#CBD5E0"/>

  <!-- Header: logo placeholder block -->
  <rect x="20" y="18" width="36" height="36" rx="6" fill="#4A90D9" opacity="0.9"/>
  <!-- Logo inner mark -->
  <rect x="27" y="25" width="8" height="22" rx="2" fill="#FFFFFF" opacity="0.9"/>
  <rect x="38" y="31" width="8" height="16" rx="2" fill="#FFFFFF" opacity="0.6"/>

  <!-- Header: report title -->
  <text x="70" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#FFFFFF">Sales Analytics</text>
  <text x="70" y="57" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#8BAFD4" letter-spacing="1.5">ENTERPRISE POWER BI  ·  PROOF OF CONCEPT</text>

  <!-- Header: right-side breadcrumb area -->
  <text x="1240" y="44" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#8BAFD4" text-anchor="end">v2.0.0</text>

  <!-- Nav panel: section labels -->
  <text x="20" y="115" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" fill="#718096" letter-spacing="1.5">NAVIGATION</text>

  <!-- Nav items (visual guides — content overlaid in PBI) -->
  <rect x="12" y="122" width="196" height="36" rx="4" fill="#1A2B4A" opacity="0.06"/>
  <rect x="20" y="136" width="3" height="10" rx="1.5" fill="#4A90D9"/>
  <text x="32" y="144" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#2D4B7C" font-weight="600">Overview</text>

  <rect x="12" y="162" width="196" height="36" rx="4" fill="transparent"/>
  <text x="32" y="183" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#718096">Sales Performance</text>

  <rect x="12" y="202" width="196" height="36" rx="4" fill="transparent"/>
  <text x="32" y="223" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#718096">Customer Analytics</text>

  <rect x="12" y="242" width="196" height="36" rx="4" fill="transparent"/>
  <text x="32" y="263" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#718096">Product Analytics</text>

  <rect x="12" y="282" width="196" height="36" rx="4" fill="transparent"/>
  <text x="32" y="303" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#718096">Geography</text>

  <rect x="12" y="322" width="196" height="36" rx="4" fill="transparent"/>
  <text x="32" y="343" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#718096">Inventory</text>

  <rect x="12" y="362" width="196" height="36" rx="4" fill="transparent"/>
  <text x="32" y="383" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#718096">Returns</text>

  <!-- Nav divider -->
  <rect x="20" y="420" width="180" height="1" fill="#CBD5E0"/>

  <!-- Nav: filter section label -->
  <text x="20" y="445" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" fill="#718096" letter-spacing="1.5">FILTERS</text>
  <text x="20" y="470" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#4A5568">Date Range</text>
  <text x="20" y="495" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#4A5568">Region</text>
  <text x="20" y="520" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#4A5568">Segment</text>
  <text x="20" y="545" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#4A5568">Product Category</text>

  <!-- Content area: KPI card row background -->
  <rect x="236" y="88" width="1028" height="110" rx="6" fill="#FFFFFF" opacity="0.7"/>

  <!-- KPI card dividers (4 cards) -->
  <rect x="493" y="100" width="1" height="86" fill="#E2E8F0"/>
  <rect x="750" y="100" width="1" height="86" fill="#E2E8F0"/>
  <rect x="1007" y="100" width="1" height="86" fill="#E2E8F0"/>

  <!-- KPI card labels (placeholder text) -->
  <text x="256" y="115" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" fill="#718096" letter-spacing="0.8">TOTAL SALES</text>
  <text x="513" y="115" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" fill="#718096" letter-spacing="0.8">GROSS PROFIT</text>
  <text x="770" y="115" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" fill="#718096" letter-spacing="0.8">ACTIVE CUSTOMERS</text>
  <text x="1027" y="115" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" fill="#718096" letter-spacing="0.8">YOY GROWTH</text>

  <!-- Content area: main chart area hint -->
  <rect x="236" y="212" width="680" height="360" rx="6" fill="#FFFFFF" opacity="0.5"/>
  <rect x="932" y="212" width="332" height="360" rx="6" fill="#FFFFFF" opacity="0.5"/>

  <!-- Footer bar -->
  <rect x="0" y="700" width="1280" height="20" fill="#EBF0F8"/>
  <rect x="0" y="700" width="1280" height="1" fill="#CBD5E0"/>
  <text x="228" y="714" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#718096">Data refreshed from CSV source  ·  Star schema model  ·  63 DAX measures</text>
  <text x="1260" y="714" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#718096" text-anchor="end">Power BI Enterprise PoC</text>
</svg>
