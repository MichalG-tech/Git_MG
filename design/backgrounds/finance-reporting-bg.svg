<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <title>Finance Reporting - Report Background</title>
  <desc>Enterprise Power BI report background for the Finance Reporting model. Import into Power BI Desktop via Format pane > Page background > Browse.</desc>

  <!-- Page canvas -->
  <rect width="1280" height="720" fill="#F7F9FC"/>

  <!-- Header bar — slightly deeper navy for Finance to differentiate from Sales -->
  <rect x="0" y="0" width="1280" height="72" fill="#152239"/>

  <!-- Header accent line — teal for Finance (vs sky blue for Sales) -->
  <rect x="0" y="69" width="1280" height="3" fill="#1DB5BE"/>

  <!-- Left navigation panel -->
  <rect x="0" y="72" width="220" height="648" fill="#EBF0F8"/>

  <!-- Nav panel right border -->
  <rect x="219" y="72" width="1" height="648" fill="#CBD5E0"/>

  <!-- Header: logo placeholder block — teal accent for Finance -->
  <rect x="20" y="18" width="36" height="36" rx="6" fill="#1DB5BE" opacity="0.9"/>
  <!-- Logo inner mark: simplified chart bars -->
  <rect x="27" y="33" width="6" height="13" rx="1" fill="#FFFFFF" opacity="0.9"/>
  <rect x="35" y="27" width="6" height="19" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <rect x="43" y="30" width="6" height="16" rx="1" fill="#FFFFFF" opacity="0.5"/>

  <!-- Header: report title -->
  <text x="70" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#FFFFFF">Finance Reporting</text>
  <text x="70" y="57" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#7ABFCA" letter-spacing="1.5">ENTERPRISE POWER BI  ·  MULTI-ENTITY P&amp;L MODEL</text>

  <!-- Header: right-side version -->
  <text x="1240" y="44" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#7ABFCA" text-anchor="end">v2.0.0</text>

  <!-- Nav panel: section labels -->
  <text x="20" y="115" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" fill="#718096" letter-spacing="1.5">NAVIGATION</text>

  <!-- Nav items -->
  <rect x="12" y="122" width="196" height="36" rx="4" fill="#152239" opacity="0.06"/>
  <rect x="20" y="136" width="3" height="10" rx="1.5" fill="#1DB5BE"/>
  <text x="32" y="144" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#2D4B7C" font-weight="600">Income Statement</text>

  <rect x="12" y="162" width="196" height="36" rx="4" fill="transparent"/>
  <text x="32" y="183" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#718096">Budget vs Actuals</text>

  <rect x="12" y="202" width="196" height="36" rx="4" fill="transparent"/>
  <text x="32" y="223" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#718096">YTD Performance</text>

  <rect x="12" y="242" width="196" height="36" rx="4" fill="transparent"/>
  <text x="32" y="263" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#718096">Prior Year Comparison</text>

  <rect x="12" y="282" width="196" height="36" rx="4" fill="transparent"/>
  <text x="32" y="303" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#718096">By Department</text>

  <rect x="12" y="322" width="196" height="36" rx="4" fill="transparent"/>
  <text x="32" y="343" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#718096">By Entity</text>

  <!-- Nav divider -->
  <rect x="20" y="380" width="180" height="1" fill="#CBD5E0"/>

  <!-- Nav: filter section label -->
  <text x="20" y="405" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" fill="#718096" letter-spacing="1.5">FILTERS</text>
  <text x="20" y="430" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#4A5568">Fiscal Period</text>
  <text x="20" y="455" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#4A5568">Entity</text>
  <text x="20" y="480" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#4A5568">Department</text>
  <text x="20" y="505" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#4A5568">Account Type</text>
  <text x="20" y="530" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#4A5568">Budget Version</text>

  <!-- Content area: KPI card row — P&L cascade -->
  <rect x="236" y="88" width="1028" height="110" rx="6" fill="#FFFFFF" opacity="0.7"/>

  <!-- KPI card dividers (5 cards for P&L) -->
  <rect x="442" y="100" width="1" height="86" fill="#E2E8F0"/>
  <rect x="648" y="100" width="1" height="86" fill="#E2E8F0"/>
  <rect x="854" y="100" width="1" height="86" fill="#E2E8F0"/>
  <rect x="1060" y="100" width="1" height="86" fill="#E2E8F0"/>

  <!-- KPI card labels -->
  <text x="256" y="115" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" fill="#718096" letter-spacing="0.8">REVENUE</text>
  <text x="462" y="115" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" fill="#718096" letter-spacing="0.8">GROSS PROFIT</text>
  <text x="668" y="115" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" fill="#718096" letter-spacing="0.8">EBITDA</text>
  <text x="874" y="115" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" fill="#718096" letter-spacing="0.8">NET INCOME</text>
  <text x="1080" y="115" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" fill="#718096" letter-spacing="0.8">BUDGET VAR.</text>

  <!-- Content area: main chart + waterfall area -->
  <rect x="236" y="212" width="680" height="360" rx="6" fill="#FFFFFF" opacity="0.5"/>
  <rect x="932" y="212" width="332" height="360" rx="6" fill="#FFFFFF" opacity="0.5"/>

  <!-- Fiscal year indicator strip -->
  <rect x="236" y="580" width="1028" height="4" rx="2" fill="#1DB5BE" opacity="0.2"/>

  <!-- Footer bar -->
  <rect x="0" y="700" width="1280" height="20" fill="#EBF0F8"/>
  <rect x="0" y="700" width="1280" height="1" fill="#CBD5E0"/>
  <text x="228" y="714" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#718096">April fiscal year  ·  Multi-entity P&amp;L  ·  Actuals vs Budget  ·  20 DAX measures</text>
  <text x="1260" y="714" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#718096" text-anchor="end">Power BI Enterprise PoC</text>
</svg>
